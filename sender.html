<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Bus Location Sender</title>
</head>

<body style="text-align:center;font-family:Arial;margin-top:50px">

<h2>🚌 Bus Location Sender</h2>

<button onclick="start()" style="font-size:18px;padding:12px">
Start Sharing
</button>

<p id="status">Waiting...</p>

<script>

const params = new URLSearchParams(window.location.search);
const BUS_ID = params.get("bus") || "bus1";

const DB = "https://bustracker-5c177-default-rtdb.asia-southeast1.firebasedatabase.app/" 
           + BUS_ID + ".json";

function start(){

 document.getElementById("status").innerHTML =
 "Requesting GPS permission...";

 if(navigator.geolocation){

  navigator.geolocation.watchPosition(sendLocation, error, {
   enableHighAccuracy:true,
   maximumAge:0,
   timeout:5000
  });

 }else{
  document.getElementById("status").innerHTML =
  "Geolocation not supported";
 }

}

function sendLocation(position){

 let lat = position.coords.latitude;
 let lon = position.coords.longitude;

 document.getElementById("status").innerHTML =
 "Bus: " + BUS_ID + "<br>" +
 "Latitude: " + lat + "<br>" +
 "Longitude: " + lon;

 fetch(DB,{
  method:"PUT",
  headers:{
   "Content-Type":"application/json"
  },
  body: JSON.stringify({
   lat: lat,
   lon: lon,
   time: Date.now()
  })
 });

}

function error(){
 document.getElementById("status").innerHTML =
 "❌ GPS Permission denied";
}

</script>

</body>
</html>

<!DOCTYPE html>

<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Bus Tracker Viewer</title>
</head>

<body style="margin:0;font-family:Arial">

<h3 style="text-align:center">🚌 Multi Bus Tracker</h3>

<div style="text-align:center;margin-bottom:10px">
<select id="busSelect" style="font-size:16px;padding:5px">
<option value="bus1">Bus 1</option>
<option value="bus2">Bus 2</option>
<option value="bus3">Bus 3</option>
</select>
</div>

<iframe id="map" width="100%" height="500" style="border:0"></iframe>

<script>

const BASE =
"https://bustracker-5c177-default-rtdb.asia-southeast1.firebasedatabase.app/";

function update(){

 let bus = document.getElementById("busSelect").value;

 fetch(BASE + bus + ".json")
 .then(r=>r.json())
 .then(d=>{
   if(!d) return;

   document.getElementById("map").src =
   "https://maps.google.com/maps?q=" +
   d.lat + "," + d.lon +
   "&z=15&output=embed";
 });

}

setInterval(update,3000);
update();

</script>

</body>
</html>

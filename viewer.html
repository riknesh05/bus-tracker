<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Multi Bus Tracker</title>

<link rel="stylesheet"
href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>
body{margin:0;font-family:Arial}
#map{height:90vh}
.topbar{padding:10px;text-align:center;background:#f5f5f5}
</style>

</head>

<body>

<div class="topbar">

<select id="busSelect">
<option value="bus1">Bus 1</option>
<option value="bus2">Bus 2</option>
<option value="bus3">Bus 3</option>
</select>

<span id="eta" style="margin-left:20px"></span>
<span id="speed" style="margin-left:20px"></span>

</div>

<div id="map"></div>

<script>

const BASE =
"https://bustracker-5c177-default-rtdb.asia-southeast1.firebasedatabase.app/";

// SCHOOL DESTINATION
const SCHOOL = [13.0827,80.2707];

// BUS STOPS (EDIT THESE)
const STOPS = [
 {name:"Stop 1", coords:[13.0700,80.2500]},
 {name:"Stop 2", coords:[13.0750,80.2600]},
 {name:"Stop 3", coords:[13.0800,80.2650]}
];

const map = L.map('map').setView(SCHOOL,13);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
 maxZoom:19
}).addTo(map);

// bus icon
const busIcon = L.icon({
 iconUrl:'https://cdn-icons-png.flaticon.com/512/61/61231.png',
 iconSize:[40,40]
});

let marker;
let routeLine;
let lastPos;
let lastTime;

// school marker
L.marker(SCHOOL).addTo(map).bindPopup("🏫 School");

// stops markers
STOPS.forEach(stop=>{
 L.marker(stop.coords).addTo(map)
 .bindPopup("🛑 " + stop.name);
});

function update(){

 let bus = document.getElementById("busSelect").value;

 fetch(BASE + bus + ".json")
 .then(r=>r.json())
 .then(d=>{

  if(!d) return;

  let lat = d.lat;
  let lon = d.lon;

  // moving marker
  if(!marker){
   marker = L.marker([lat,lon],{icon:busIcon}).addTo(map);
  }else{
   marker.setLatLng([lat,lon]);
  }

  // speed calculation
  if(lastPos){
   let dist = map.distance(lastPos,[lat,lon]) / 1000;
   let time = (Date.now()-lastTime)/3600000;
   let speed = dist/time;

   document.getElementById("speed").innerHTML =
   "Speed: " + speed.toFixed(1) + " km/h";
  }

  lastPos = [lat,lon];
  lastTime = Date.now();

  // route via OSRM
  fetch(`https://router.project-osrm.org/route/v1/driving/${lon},${lat};${SCHOOL[1]},${SCHOOL[0]}?overview=full&geometries=geojson`)
  .then(r=>r.json())
  .then(route=>{

   let coords = route.routes[0].geometry.coordinates;

   let latlngs = coords.map(c=>[c[1],c[0]]);

   if(routeLine){
    map.removeLayer(routeLine);
   }

   routeLine = L.polyline(latlngs,{
    color:'green',
    weight:4
   }).addTo(map);

   // ETA school
   let eta = route.routes[0].duration / 60;

   document.getElementById("eta").innerHTML =
   "School ETA: " + eta.toFixed(1) + " min";

   // arrival school alert
   let dist = route.routes[0].distance / 1000;
   if(dist < 0.3){
    alert("🚌 Bus Arriving at School!");
   }

  });

  // stops ETA
  STOPS.forEach(stop=>{

   fetch(`https://router.project-osrm.org/route/v1/driving/${lon},${lat};${stop.coords[1]},${stop.coords[0]}?overview=false`)
   .then(r=>r.json())
   .then(res=>{

    let eta = res.routes[0].duration/60;
    let dist = res.routes[0].distance/1000;

    // arrival alert
    if(dist < 0.2){
     alert("🛑 Arriving at " + stop.name);
    }

   });

  });

 });

}

setInterval(update,5000);
update();

</script>

</body>
</html>

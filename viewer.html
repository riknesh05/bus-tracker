<!DOCTYPE html>

<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Bus Tracker Viewer</title>
</head>

<body style="margin:0">
<h3 style="text-align:center">🚌 Bus Live Location</h3>

<iframe id="map" width="100%" height="500" style="border:0"></iframe>

<script>
const DB = "https://bustracker-5c177-default-rtdb.asia-southeast1.firebasedatabase.app/location.json";

function update(){
 fetch(DB)
 .then(r=>r.json())
 .then(d=>{
   if(!d) return;

   document.getElementById("map").src =
   "https://maps.google.com/maps?q="+
   d.lat + "," + d.lon +
   "&z=16&output=embed";
 });
}

setInterval(update,3000);
update();
</script>

</body>
</html>
